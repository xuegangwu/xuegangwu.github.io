server {
    server_name design.solaripple.com;

    root /var/www/design.solaripple.com;
    index index.html;

    client_max_body_size 10M;
    proxy_read_timeout 300s;
    proxy_connect_timeout 75s;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /api {
        proxy_pass http://127.0.0.1:3013;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/design.solaripple.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/design.solaripple.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}
server {
    if ($host = design.solaripple.com) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name design.solaripple.com;
    return 404;
}
